<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Invoice Scanner | Baubranche</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <!-- SheetJS (XLSX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-[#0a0514] text-[#f8fafc] font-sans antialiased overflow-x-hidden min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const IconUploadCloud = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
    const IconDownload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconKey = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>;
    const IconLoader = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const IconFileText = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    const IconTrash2 = ({ className, onClick }) => <svg onClick={onClick} className={`cursor-pointer ${className}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;

    function App() {
      const [apiKey, setApiKey] = useState('');
      const [isKeySaved, setIsKeySaved] = useState(false);
      const [showApiKeyInput, setShowApiKeyInput] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [processStatus, setProcessStatus] = useState('');
      const [invoices, setInvoices] = useState([]);
      const fileInputRef = useRef(null);

      useEffect(() => {
        const savedKey = localStorage.getItem('gemini_api_key_invoices');
        if (savedKey) {
          setApiKey(savedKey);
          setIsKeySaved(true);
        } else {
          setShowApiKeyInput(true);
        }
      }, []);

      const handleApiKeyChange = (e) => {
        setApiKey(e.target.value);
        if (isKeySaved) setIsKeySaved(false);
      };

      const saveApiKey = () => {
        if (!apiKey) return;
        if (window.confirm("Der Gemini API Key wird im lokalen Speicher (LocalStorage) deines Browsers abgelegt.\nMöchtest du fortfahren?")) {
          localStorage.setItem('gemini_api_key_invoices', apiKey);
          setIsKeySaved(true);
        }
      };

      const clearApiKey = () => {
        if (window.confirm("Bist du sicher, dass du deinen gespeicherten API Key löschen möchtest?")) {
          localStorage.removeItem('gemini_api_key_invoices');
          setApiKey('');
          setIsKeySaved(false);
        }
      };

      // Drag & Drop Handlers
      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") setDragActive(true);
        else if (e.type === "dragleave") setDragActive(false);
      };

      const handleDrop = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          await processFiles(Array.from(e.dataTransfer.files));
        }
      };

      const handleFileInput = async (e) => {
        if (e.target.files && e.target.files[0]) {
           await processFiles(Array.from(e.target.files));
        }
      };

      // Format current timestamp
      const getCurrentDate = () => {
         const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
         return new Date().toLocaleDateString('de-DE', dateOptions);
      };

      // --- Processing Logic ---
      const processFiles = async (files) => {
        if (!apiKey) {
           alert("Bitte hinterlege zuerst deinen Gemini API Key oben rechts.");
           setShowApiKeyInput(true);
           return;
        }

        const pdfFiles = files.filter(f => f.type === 'application/pdf');
        if(pdfFiles.length === 0) {
           alert("Bitte lade nur PDF-Dateien hoch.");
           return;
        }

        setIsProcessing(true);
        const newInvoices = [];

        for (let i = 0; i < pdfFiles.length; i++) {
          const file = pdfFiles[i];
          setProcessStatus(`KI analysiert ${file.name} (${i+1}/${pdfFiles.length})...`);
          
          try {
            // 1. Extract raw text from PDF
            const text = await extractTextFromPDF(file);
            
            // 2. Call Gemini
            setProcessStatus(`Extrahiere Baudaten aus ${file.name}...`);
            const data = await askGemini(text);

            newInvoices.push({
               id: Date.now() + Math.random(),
               filename: file.name,
               kunde: data.kunde || '-',
               datum: data.datum || '-',
               betrag: data.betrag || '-',
               projekt: data.projekt || '-'
            });

          } catch (err) {
            console.error(err);
            alert(`Fehler bei Datei ${file.name}: ${err.message}`);
          }
        }

        if(newInvoices.length > 0) {
           setInvoices(prev => [...newInvoices, ...prev]);
        }
        
        setIsProcessing(false);
        setProcessStatus('');
        if(fileInputRef.current) fileInputRef.current.value = "";
      };

      const extractTextFromPDF = async (file) => {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        for(let i = 1; i <= pdf.numPages; i++) {
           const page = await pdf.getPage(i);
           const content = await page.getTextContent();
           const strings = content.items.map(item => item.str);
           fullText += strings.join(" ") + "\n";
        }
        return fullText.trim();
      };

      const askGemini = async (text) => {
        const prompt = `Du bist ein hochpräziser Rechnungsprüfer in der Baubranche.
Lies den folgenden Rechnungstext und extrahiere die Kerninformationen.
Antworte AUSSCHLIESSLICH mit einem JSON Objekt (ohne Markdown, ohne \`\`\`json).
Struktur:
{
  "kunde": "Name des Kunden/Rechnungsempfängers",
  "datum": "Rechnungsdatum",
  "betrag": "Betrag inklusive Währung und Angabe ob Netto oder Brutto (z.B. '4.500,00 € (Brutto)')",
  "projekt": "Projektname, Bauvorhaben oder allgemeiner Betreff"
}

Rechnungstext:
"""
${text.substring(0, 30000)}
"""`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { response_mime_type: "application/json" }
          })
        });

        const json = await response.json();
        
        if (json.error) throw new Error(json.error.message);
        if (!json.candidates || json.candidates.length === 0) throw new Error("Keine Antwort von Gemini.");

        const responseText = json.candidates[0].content.parts[0].text;
        return JSON.parse(responseText.trim());
      };

      const removeInvoice = (id) => {
         setInvoices(invoices.filter(inv => inv.id !== id));
      };

      const exportToExcel = () => {
         if(invoices.length === 0) return;
         
         const exportData = invoices.map(inv => ({
            "Dateiname": inv.filename,
            "Kunde": inv.kunde,
            "Datum": inv.datum,
            "Betrag (Netto/Brutto)": inv.betrag,
            "Betreff/Projekt": inv.projekt
         }));

         const ws = XLSX.utils.json_to_sheet(exportData);
         const wb = XLSX.utils.book_new();
         XLSX.utils.book_append_sheet(wb, ws, "Rechnungen");
         XLSX.writeFile(wb, "Baubranche_Rechnungsexport.xlsx");
      };

      return (
        <div 
          className="flex flex-col items-center p-6 md:p-10 relative z-10 w-full max-w-[1200px] mx-auto min-h-screen"
          style={{
            backgroundImage: 'radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(126, 34, 206, 0.1) 0%, transparent 40%)'
          }}
        >
          {/* Settings Bar */}
          <div className="w-full flex justify-end mb-8 relative z-20">
             <div className="flex z-10 items-center justify-end bg-black/40 border border-white/10 rounded-full px-4 py-2 gap-3 transition-all hover:border-purple-500/50">
               <IconKey className="w-4 h-4 text-purple-400" />
               <input 
                 type={showApiKeyInput ? "text" : "password"}
                 value={apiKey}
                 onChange={handleApiKeyChange}
                 placeholder="Gemini API Key..."
                 className="bg-transparent border-none text-xs text-white outline-none w-[200px] placeholder:text-gray-500"
               />
               <button onClick={() => setShowApiKeyInput(!showApiKeyInput)} className="text-[10px] uppercase text-gray-400 hover:text-white transition-colors tracking-widest font-medium">
                 {showApiKeyInput ? 'Hide' : 'Show'}
               </button>
               {apiKey && !isKeySaved && (
                 <button onClick={saveApiKey} className="text-[10px] uppercase text-purple-400 hover:text-purple-300 transition-colors tracking-widest font-medium border-l border-white/10 pl-3">
                   Save
                 </button>
               )}
               {isKeySaved && (
                 <button onClick={clearApiKey} className="text-[10px] uppercase text-red-500 hover:text-red-400 transition-colors tracking-widest font-medium border-l border-white/10 pl-3">
                   Clear
                 </button>
               )}
             </div>
          </div>

          <header className="w-full flex flex-col md:flex-row justify-between items-start md:items-end mb-10 z-10 gap-4">
            <div className="branding">
              <h1 className="text-[36px] font-[800] tracking-[-0.03em] bg-gradient-to-br from-white via-gray-200 to-[#a855f7] text-transparent bg-clip-text leading-tight mb-2">
                AI Invoice Scanner
              </h1>
              <p className="text-gray-400 text-sm tracking-wide">Automatisierte Rechnungserfassung für Bauprojekte</p>
            </div>
            <div className="text-[14px] text-[#94a3b8] uppercase tracking-[0.1em] font-medium px-4 py-2 bg-white/[0.03] rounded-lg border border-white/5">
              {getCurrentDate()}
            </div>
          </header>

          <main className="w-full flex flex-col gap-8 z-10 pb-20">
            
            {/* Drag & Drop Zone */}
            <section 
              className={`relative bg-white/[0.02] backdrop-blur-[20px] rounded-[24px] p-12 transition-all duration-300 flex flex-col items-center justify-center text-center border-2 border-dashed ${dragActive ? 'border-[#a855f7] bg-[#a855f7]/5 shadow-[0_0_30px_rgba(168,85,247,0.2)]' : 'border-white/20 hover:border-white/40'}`}
              onDragEnter={handleDrag}
              onDragLeave={handleDrag}
              onDragOver={handleDrag}
              onDrop={handleDrop}
            >
              <input 
                ref={fileInputRef}
                type="file" 
                accept="application/pdf"
                multiple 
                className="hidden" 
                onChange={handleFileInput}
              />
              
              {!isProcessing ? (
                 <>
                   <div className="w-20 h-20 rounded-full bg-purple-500/10 flex items-center justify-center mb-6">
                     <IconUploadCloud className="w-10 h-10 text-[#a855f7]" />
                   </div>
                   <h2 className="text-2xl font-bold mb-2">PDF-Rechnungen hier ablegen</h2>
                   <p className="text-gray-400 mb-8 max-w-md mx-auto">Zieh deine Baurechnungen einfach in dieses Feld oder klicke, um Dateien auf deinem Computer auszuwählen.</p>
                   <button 
                     onClick={() => fileInputRef.current?.click()}
                     className="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-8 py-3 rounded-full font-medium transition-colors flex items-center gap-2"
                   >
                     <IconFileText className="w-5 h-5" /> Dateien auswählen
                   </button>
                 </>
              ) : (
                 <div className="flex flex-col items-center py-10 w-full max-w-md">
                   <div className="w-16 h-16 rounded-full bg-[#a855f7]/20 flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(168,85,247,0.5)]">
                     <IconLoader className="w-8 h-8 text-[#a855f7]" />
                   </div>
                   <h2 className="text-xl font-bold mb-2 animate-pulse text-purple-200">{processStatus}</h2>
                   <div className="w-full bg-white/10 h-2 rounded-full mt-4 overflow-hidden">
                      <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500 w-full animate-[progress_2s_ease-in-out_infinite] origin-left"></div>
                   </div>
                 </div>
              )}
            </section>

            {/* Extracted Data Table */}
            {invoices.length > 0 && (
              <section className="bg-white/[0.03] backdrop-blur-[20px] border border-white/10 rounded-[24px] p-8 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] flex flex-col gap-6 animate-in slide-in-from-bottom-8 duration-500">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <div>
                    <h3 className="text-xl font-bold text-white flex items-center gap-2">
                       <IconFileText className="w-5 h-5 text-purple-400" /> Ausgelesene Rechnungen
                    </h3>
                    <p className="text-sm text-gray-400 mt-1">{invoices.length} Dokument(e) via KI extrahiert.</p>
                  </div>
                  <button 
                    onClick={exportToExcel}
                    className="bg-[#a855f7] hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl font-medium shadow-[0_4px_15px_rgba(168,85,247,0.4)] transition-all flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98]"
                  >
                    <IconDownload className="w-4 h-4" /> In Excel exportieren
                  </button>
                </div>

                <div className="w-full overflow-x-auto rounded-xl border border-white/10 mt-4">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-white/5 border-b border-white/10">
                      <tr>
                        <th className="px-5 py-4 font-semibold text-gray-300">Kunde / Empfänger</th>
                        <th className="px-5 py-4 font-semibold text-gray-300">Datum</th>
                        <th className="px-5 py-4 font-semibold text-gray-300">Betreff / Projekt</th>
                        <th className="px-5 py-4 font-semibold text-gray-300">Betrag</th>
                        <th className="px-5 py-4 font-semibold text-gray-300 text-center">Aktion</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/5">
                      {invoices.map((inv) => (
                        <tr key={inv.id} className="hover:bg-white/[0.02] transition-colors">
                          <td className="px-5 py-4 text-white font-medium">
                            {inv.kunde}
                            <div className="text-[10px] text-gray-500 font-normal mt-1">{inv.filename}</div>
                          </td>
                          <td className="px-5 py-4 text-gray-300">{inv.datum}</td>
                          <td className="px-5 py-4 text-gray-300 max-w-[250px] truncate" title={inv.projekt}>{inv.projekt}</td>
                          <td className="px-5 py-4 text-purple-300 font-medium">{inv.betrag}</td>
                          <td className="px-5 py-4 text-center">
                            <button onClick={() => removeInvoice(inv.id)} className="text-gray-500 hover:text-red-400 p-2 rounded-lg hover:bg-red-400/10 transition-colors">
                              <IconTrash2 className="w-4 h-4" />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </section>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    @keyframes progress {
       0% { transform: scaleX(0); opacity: 1; }
       50% { transform: scaleX(0.5); opacity: 0.8; }
       100% { transform: scaleX(1); opacity: 0; }
    }
  </style>
</body>
</html>
