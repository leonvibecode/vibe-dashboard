<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Invoice Renamer</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
</head>
<body class="bg-[#0a0514] text-[#f8fafc] font-sans antialiased overflow-x-hidden min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const IconUploadCloud = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
    const IconDownload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconKey = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>;
    const IconLoader = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const IconFileText = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    const IconTrash2 = ({ className, onClick }) => <svg onClick={onClick} className={`cursor-pointer ${className}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const IconArrowRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;

    function App() {
      const [apiKey, setApiKey] = useState('');
      const [isKeySaved, setIsKeySaved] = useState(false);
      const [showApiKeyInput, setShowApiKeyInput] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      
      // state for currently processing overall
      const [isProcessing, setIsProcessing] = useState(false);
      const [processStatus, setProcessStatus] = useState('');
      
      // List of files that have been processed or are in process
      const [filesList, setFilesList] = useState([]);
      const fileInputRef = useRef(null);

      useEffect(() => {
        const savedKey = localStorage.getItem('gemini_api_key_invoices');
        if (savedKey) {
          setApiKey(savedKey);
          setIsKeySaved(true);
        } else {
          setShowApiKeyInput(true);
        }
      }, []);

      const handleApiKeyChange = (e) => {
        setApiKey(e.target.value);
        if (isKeySaved) setIsKeySaved(false);
      };

      const saveApiKey = () => {
        if (!apiKey) return;
        if (window.confirm("Der Gemini API Key wird im lokalen Speicher (LocalStorage) deines Browsers abgelegt.\nMöchtest du fortfahren?")) {
          localStorage.setItem('gemini_api_key_invoices', apiKey);
          setIsKeySaved(true);
        }
      };

      const clearApiKey = () => {
        if (window.confirm("Bist du sicher, dass du deinen gespeicherten API Key löschen möchtest?")) {
          localStorage.removeItem('gemini_api_key_invoices');
          setApiKey('');
          setIsKeySaved(false);
        }
      };

      // Drag & Drop Handlers
      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") setDragActive(true);
        else if (e.type === "dragleave") setDragActive(false);
      };

      const handleDrop = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          await processFiles(Array.from(e.dataTransfer.files));
        }
      };

      const handleFileInput = async (e) => {
        if (e.target.files && e.target.files[0]) {
           await processFiles(Array.from(e.target.files));
        }
      };

      // Format current timestamp
      const getCurrentDate = () => {
         const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
         return new Date().toLocaleDateString('de-DE', dateOptions);
      };

      // Sanitize Filename
      const sanitizeFilename = (str) => {
        if (!str || str === "unbekannt" || !str.toString) return "unbekannt";
        
        // Remove typical company suffixes
        let cleaned = str.toString()
          .replace(/\b(GmbH|Co\.?\s*KG|AG|UG|haftungsbeschränkt|Ltd\.?|Inc\.?)\b/gi, '')
          .trim();
          
        // Remove characters that aren't letters, numbers, or safe symbols, replace spaces with underscores
        return cleaned
          .replace(/[\\/:*?"<>|\s,]+/g, '_')
          .replace(/_+/g, '_') // Avoid double underscores
          .replace(/^_|_$/g, ''); // Remove leading/trailing underscores
      };

      // --- Processing Logic ---
      const processFiles = async (files) => {
        if (!apiKey) {
           alert("Bitte hinterlege und speichere zuerst deinen Gemini API Key oben rechts.");
           setShowApiKeyInput(true);
           return;
        }

        const pdfFiles = files.filter(f => f.type === 'application/pdf');
        if(pdfFiles.length === 0) {
           alert("Bitte lade nur PDF-Dateien hoch.");
           return;
        }

        setIsProcessing(true);

        const processingFiles = pdfFiles.map(f => ({
          id: Date.now() + Math.random(),
          file: f,
          originalName: f.name,
          newName: '',
          status: 'pending',
          data: null
        }));

        // Add to state immediately to show progress in UI
        setFilesList(prev => [...processingFiles, ...prev]);

        for (let i = 0; i < processingFiles.length; i++) {
          const currentFileObj = processingFiles[i];
          const file = currentFileObj.file;

          const updateStatus = (statusMessage, fileUpdates) => {
            setProcessStatus(statusMessage);
            setFilesList(currentList => 
              currentList.map(item => item.id === currentFileObj.id ? { ...item, ...fileUpdates } : item)
            );
          };

          try {
            updateStatus(`Lese PDF... (${i+1}/${processingFiles.length})`, { status: 'reading' });
            
            // 1. Extract raw text from max 2 pages of PDF
            const text = await extractTextFromPDF(file);
            
            // 2. Call Gemini
            updateStatus(`KI extrahiert Daten... (${i+1}/${processingFiles.length})`, { status: 'ai_processing' });
            const data = await askGemini(text);

            // 3. Construct new name
            const date = (data.rechnungsdatum && data.rechnungsdatum !== "unbekannt") ? data.rechnungsdatum : "0000-00-00";
            const aussteller = sanitizeFilename(data.aussteller);
            const betreff = sanitizeFilename(data.betreff);
            const nr = sanitizeFilename(data.rechnungsnummer);

            const newName = `0000_${date}_${aussteller}_${betreff}_Rechnungnr_${nr}.pdf`.replace(/_+/g, '_');

            updateStatus(`Fertig`, { 
              status: 'success', 
              newName: newName,
              data: data 
            });

          } catch (err) {
            console.error(err);
            updateStatus(`Fehler`, { 
              status: 'error', 
              error: err.message 
            });
          }
        }
        
        setIsProcessing(false);
        setProcessStatus('');
        if(fileInputRef.current) fileInputRef.current.value = "";
      };

      // Extract text from the first 2 pages
      const extractTextFromPDF = async (file) => {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        
        const maxPages = Math.min(2, pdf.numPages);
        
        for(let i = 1; i <= maxPages; i++) {
           const page = await pdf.getPage(i);
           const content = await page.getTextContent();
           const strings = content.items.map(item => item.str);
           fullText += strings.join(" ") + "\n";
        }
        return fullText.trim();
      };

      const askGemini = async (text) => {
        const prompt = `Du bist ein hochpräziser Rechnungsprüfer. Extrahiere die folgenden Daten aus dem Text und antworte AUSSCHLIESSLICH mit einem strikten JSON-Objekt.
Wenn ein Feld fehlt, nutze "unbekannt" (oder "0000-00-00" für das Datum).

REGELN FÜR DIE EXTRAKTION:
- rechnungsdatum: Das Haupt-Datum der Rechnung/Abrechnung (YYYY-MM-DD).
- aussteller: Der Name des Unternehmens, das die Rechnung stellt (OHNE Rechtsformen wie GmbH, AG, Co. KG etc.).
- betreff: Ein kurzes Schlagwort (max 3 Worte) zum inhaltlichen Kern der Leistung (z.B. "Tanken", "Fahrzeugkosten", "Material"). WICHTIG: Vermeide generische Begriffe wie "Gesamtsummenblatt".
- rechnungsnummer: Die primäre Identifikationsnummer des Dokuments.
  * Suche zuerst nach 'Abrechnungsnummer', 'Belegnummer' oder 'Rechnungsnummer' im oberen Drittel oder in der Haupt-Zusammenfassung.
  * Eine 'Abrechnungsnummer' (z.B. bei Tankkarten) hat IMMER Vorrang vor einzelnen Rechnungsnummern aus Tabellenzeilen.
  * Falls unsicher: Wähle die Nummer, die am häufigsten im Zusammenhang mit dem Datum genannt wird.

JSON-Struktur MUSS exakt so aussehen: { "rechnungsdatum": "...", "aussteller": "...", "betreff": "...", "rechnungsnummer": "..." }

Invoice Text:
"""
${text.substring(0, 15000)}
"""`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { response_mime_type: "application/json" }
          })
        });

        const json = await response.json();
        
        if (json.error) throw new Error(json.error.message);
        if (!json.candidates || json.candidates.length === 0) throw new Error("Keine Antwort von Gemini.");

        const responseText = json.candidates[0].content.parts[0].text;
        
        try {
          return JSON.parse(responseText.trim());
        } catch (e) {
          throw new Error("KI lieferte kein valides JSON zurück.");
        }
      };

      const removeFile = (id) => {
         setFilesList(filesList.filter(f => f.id !== id));
      };

      // Trigger standard HTML5 download
      const handleDownload = (fileObj, newName) => {
         const url = URL.createObjectURL(fileObj);
         const a = document.createElement('a');
         a.href = url;
         a.download = newName;
         document.body.appendChild(a);
         a.click();
         document.body.removeChild(a);
         URL.revokeObjectURL(url);
      };

      return (
        <div 
          className="flex flex-col items-center p-6 md:p-10 relative z-10 w-full max-w-[1200px] mx-auto min-h-screen"
          style={{
            backgroundImage: 'radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(126, 34, 206, 0.1) 0%, transparent 40%)'
          }}
        >
          {/* Settings Bar */}
          <div className="w-full flex justify-end mb-8 relative z-20">
             <div className="flex z-10 items-center justify-end bg-black/40 border border-white/10 rounded-full px-4 py-2 gap-3 transition-all hover:border-purple-500/50 shadow-sm shadow-[#a855f7]/5">
               <IconKey className="w-4 h-4 text-purple-400" />
               <input 
                 type={showApiKeyInput ? "text" : "password"}
                 value={apiKey}
                 onChange={handleApiKeyChange}
                 placeholder="Gemini API Key..."
                 className="bg-transparent border-none text-xs text-white outline-none w-[200px] placeholder:text-gray-500"
               />
               <button onClick={() => setShowApiKeyInput(!showApiKeyInput)} className="text-[10px] uppercase text-gray-400 hover:text-white transition-colors tracking-widest font-medium">
                 {showApiKeyInput ? 'Hide' : 'Show'}
               </button>
               {apiKey && !isKeySaved && (
                 <button onClick={saveApiKey} className="text-[10px] uppercase text-purple-400 hover:text-purple-300 transition-colors tracking-widest font-medium border-l border-white/10 pl-3">
                   Save
                 </button>
               )}
               {isKeySaved && (
                 <button onClick={clearApiKey} className="text-[10px] uppercase text-red-500 hover:text-red-400 transition-colors tracking-widest font-medium border-l border-white/10 pl-3">
                   Clear
                 </button>
               )}
             </div>
          </div>

          <header className="w-full flex flex-col md:flex-row justify-between items-start md:items-end mb-10 z-10 gap-4">
            <div className="branding">
              <h1 className="text-[36px] font-[800] tracking-[-0.03em] bg-gradient-to-br from-white via-gray-200 to-[#a855f7] text-transparent bg-clip-text leading-tight mb-2">
                AI Invoice Renamer
              </h1>
              <p className="text-gray-400 text-sm tracking-wide">Automatisches Umbenennen von Baurechnungen nach Schema</p>
            </div>
            <div className="text-[14px] text-[#94a3b8] uppercase tracking-[0.1em] font-medium px-4 py-2 bg-white/[0.03] rounded-lg border border-white/5">
              {getCurrentDate()}
            </div>
          </header>

          <main className="w-full flex flex-col gap-8 z-10 pb-20">
            
            {/* Drag & Drop Zone */}
            <section 
              className={`relative bg-white/[0.02] backdrop-blur-[20px] rounded-[24px] p-12 transition-all duration-300 flex flex-col items-center justify-center text-center border-2 border-dashed ${dragActive ? 'border-[#a855f7] bg-[#a855f7]/5 shadow-[0_0_30px_rgba(168,85,247,0.2)]' : 'border-white/20 hover:border-white/40'}`}
              onDragEnter={handleDrag}
              onDragLeave={handleDrag}
              onDragOver={handleDrag}
              onDrop={handleDrop}
            >
              <input 
                ref={fileInputRef}
                type="file" 
                accept="application/pdf"
                multiple 
                className="hidden" 
                onChange={handleFileInput}
              />
              
              {!isProcessing ? (
                 <>
                   <div className="w-20 h-20 rounded-full bg-purple-500/10 flex items-center justify-center mb-6">
                     <IconUploadCloud className="w-10 h-10 text-[#a855f7]" />
                   </div>
                   <h2 className="text-2xl font-bold mb-2">Drag & Drop PDF</h2>
                   <p className="text-gray-400 mb-8 max-w-md mx-auto">Lege deine PDF-Rechnungen hier ab, um die KI-gestützte Umbenennung zu starten (max. 2 Seiten pro PDF werden gelesen).</p>
                   <button 
                     onClick={() => fileInputRef.current?.click()}
                     className="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-8 py-3 rounded-full font-medium transition-colors flex items-center gap-2"
                   >
                     <IconFileText className="w-5 h-5" /> Dateien auswählen
                   </button>
                 </>
              ) : (
                 <div className="flex flex-col items-center py-10 w-full max-w-md">
                   <div className="w-16 h-16 rounded-full bg-[#a855f7]/20 flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(168,85,247,0.5)]">
                     <IconLoader className="w-8 h-8 text-[#a855f7]" />
                   </div>
                   <h2 className="text-xl font-bold mb-2 animate-pulse text-purple-200">{processStatus}</h2>
                   <div className="text-sm text-gray-400 mt-2">Bitte Fenster nicht schließen.</div>
                   <div className="w-full bg-white/10 h-2 rounded-full mt-6 overflow-hidden">
                      <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500 w-full animate-[progress_2s_ease-in-out_infinite] origin-left"></div>
                   </div>
                 </div>
              )}
            </section>

            {/* Processed Files List */}
            {filesList.length > 0 && (
              <section className="flex flex-col gap-4 animate-in slide-in-from-bottom-8 duration-500">
                <h3 className="text-xl font-bold text-white flex items-center gap-2 mb-2 px-2">
                   <IconCheckCircle className="w-5 h-5 text-purple-400" /> Verarbeitete Dateien
                </h3>
                
                {filesList.map((item) => (
                  <div key={item.id} className="bg-white/[0.03] backdrop-blur-[20px] border border-white/10 rounded-2xl p-5 shadow-lg flex flex-col sm:flex-row items-center gap-4 justify-between group hover:bg-white/[0.05] transition-colors">
                    
                    <div className="flex w-full sm:w-auto items-center flex-1 min-w-0 gap-4">
                      {item.status === 'pending' || item.status === 'reading' || item.status === 'ai_processing' ? (
                        <div className="p-3 bg-white/5 rounded-xl text-purple-400">
                          <IconLoader className="w-6 h-6" />
                        </div>
                      ) : item.status === 'error' ? (
                        <div className="p-3 bg-red-500/10 rounded-xl text-red-400">
                          <IconFileText className="w-6 h-6" />
                        </div>
                      ) : (
                         <div className="p-3 bg-green-500/10 rounded-xl text-green-400">
                           <IconFileText className="w-6 h-6" />
                         </div>
                      )}

                      <div className="flex-1 min-w-0">
                        {item.status === 'success' ? (
                          <>
                            <p className="text-sm text-gray-400 truncate mb-1" title={item.originalName}>{item.originalName}</p>
                            <div className="flex items-center gap-2 text-white font-medium">
                              <IconArrowRight className="w-4 h-4 text-purple-400 flex-shrink-0" />
                              <span className="truncate" title={item.newName}>{item.newName}</span>
                            </div>
                          </>
                        ) : item.status === 'error' ? (
                           <>
                            <p className="text-white font-medium truncate mb-1" title={item.originalName}>{item.originalName}</p>
                            <p className="text-xs text-red-400">Fehler: {item.error}</p>
                           </>
                        ) : (
                           <>
                            <p className="text-white font-medium truncate mb-1" title={item.originalName}>{item.originalName}</p>
                            <p className="text-xs text-purple-300 animate-pulse">Wird verarbeitet...</p>
                           </>
                        )}
                      </div>
                    </div>

                    <div className="flex items-center gap-3 w-full sm:w-auto mt-4 sm:mt-0 pt-4 sm:pt-0 border-t border-white/10 sm:border-0 justify-end flex-shrink-0">
                      {item.status === 'success' && (
                         <button 
                           onClick={() => handleDownload(item.file, item.newName)}
                           className="bg-[#a855f7] hover:bg-purple-500 text-white px-5 py-2 rounded-xl text-sm font-medium shadow-[0_4px_15px_rgba(168,85,247,0.3)] transition-all flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98]"
                         >
                           <IconDownload className="w-4 h-4" /> Datei herunterladen
                         </button>
                      )}
                      
                      <button onClick={() => removeFile(item.id)} className="text-gray-500 hover:text-red-400 p-2 rounded-lg hover:bg-red-400/10 transition-colors" title="Aus Liste entfernen">
                        <IconTrash2 className="w-4 h-4" />
                      </button>
                    </div>

                  </div>
                ))}
              </section>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    @keyframes progress {
       0% { transform: scaleX(0); opacity: 1; }
       50% { transform: scaleX(0.5); opacity: 0.8; }
       100% { transform: scaleX(1); opacity: 0; }
    }
  </style>
</body>
</html>
