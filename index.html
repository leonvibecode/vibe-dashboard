<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solopreneur Vibe Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for JSX compilation in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-[#0a0514] text-[#f8fafc] font-sans antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Custom inline SVG icons matching Lucide React
    const IconTarget = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const IconDollar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
    const IconBot = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>;
    const IconCode = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
    const IconTriangle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/></svg>;
    const IconSparkles = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconTrendingUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;

    const QUOTES = [
      "Code is cheap, vibes are expensive.",
      "Ship it before you're ready.",
      "Progress over perfection.",
      "If it works on localhost, it's halfway there.",
      "Make it work, make it right, make it fast.",
      "Build what you love."
    ];

    function App() {
      const [focus, setFocus] = useState('');
      const [revenue, setRevenue] = useState(0);
      const [revenueInput, setRevenueInput] = useState('');
      
      const [tasks, setTasks] = useState([
        { id: 1, text: '', completed: false },
        { id: 2, text: '', completed: false },
        { id: 3, text: '', completed: false }
      ]);
      const [isPulsating, setIsPulsating] = useState(false);
      const [quote, setQuote] = useState('');

      useEffect(() => {
        const savedFocus = localStorage.getItem('solopreneur_focus');
        const savedRevenue = localStorage.getItem('solopreneur_revenue');
        if (savedFocus) setFocus(savedFocus);
        if (savedRevenue) setRevenue(Number(savedRevenue));

        const savedTasks = localStorage.getItem('solopreneur_tasks');
        if (savedTasks) {
          try {
            setTasks(JSON.parse(savedTasks));
          } catch (e) {
            console.error("Error parsing tasks", e);
          }
        }

        setQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
      }, []);

      const handleFocusChange = (e) => {
        setFocus(e.target.value);
        localStorage.setItem('solopreneur_focus', e.target.value);
      };

      const handleTaskTextChange = (id, newText) => {
        const newTasks = tasks.map(t => t.id === id ? { ...t, text: newText } : t);
        setTasks(newTasks);
        localStorage.setItem('solopreneur_tasks', JSON.stringify(newTasks));
      };

      const toggleTask = (id) => {
        const newTasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        setTasks(newTasks);
        localStorage.setItem('solopreneur_tasks', JSON.stringify(newTasks));
      };

      const handleAddRevenue = () => {
        const amount = Number(revenueInput);
        if (amount > 0) {
          const newRevenue = revenue + amount;
          setRevenue(newRevenue);
          localStorage.setItem('solopreneur_revenue', String(newRevenue));
          setRevenueInput('');
          
          const duration = 2000;
          const end = Date.now() + duration;

          const frame = () => {
            confetti({
              particleCount: 4,
              angle: 60,
              spread: 55,
              origin: { x: 0 },
              colors: ['#a855f7', '#d8b4fe', '#ffffff']
            });
            confetti({
              particleCount: 4,
              angle: 120,
              spread: 55,
              origin: { x: 1 },
              colors: ['#a855f7', '#d8b4fe', '#ffffff']
            });

            if (Date.now() < end) {
              requestAnimationFrame(frame);
            }
          };
          frame();
          
          setIsPulsating(true);
          setTimeout(() => setIsPulsating(false), 500);
        }
      };

      const clearRevenue = () => {
        setRevenue(0);
        localStorage.setItem('solopreneur_revenue', '0');
      }

      const tools = [
        { name: 'Claude', desc: 'AI Writing & Coding', icon: IconBot, url: 'https://claude.ai' },
        { name: 'AI Studio', desc: 'Prompt Engineering', icon: IconCode, url: 'https://aistudio.google.com' },
        { name: 'Vercel', desc: 'Deployment & Cloud', icon: IconTriangle, url: 'https://vercel.com' },
      ];

      const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
      const currentDateFormatted = new Date().toLocaleDateString('de-DE', dateOptions);

      return (
        <div className="min-h-screen flex flex-col items-center p-6 md:p-10 relative" style={{ backgroundImage: 'radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(126, 34, 206, 0.15) 0%, transparent 40%)' }}>
          <div className="absolute top-[-100px] right-[-100px] w-[400px] h-[400px] bg-[rgba(168,85,247,0.4)] blur-[120px] rounded-full z-0 pointer-events-none" />

          <header className="w-full max-w-[1024px] flex justify-between items-end mb-10 z-10">
            <div className="branding">
              <h1 className="text-[32px] font-[800] tracking-[-0.03em] bg-gradient-to-br from-white to-[#a855f7] text-transparent bg-clip-text leading-tight">
                Solopreneur Vibe
              </h1>
            </div>
            <div className="text-[14px] text-[#94a3b8] uppercase tracking-[0.1em]">
              {currentDateFormatted}
            </div>
          </header>

          <main className="w-full max-w-[1024px] grid grid-cols-1 md:grid-cols-[1.5fr_1fr] gap-6 z-10">
            
            <section className="bg-white/[0.03] backdrop-blur-[20px] border border-white/10 rounded-[24px] p-8 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] flex flex-col justify-start">
              <div className="mb-8">
                <h2 className="text-[12px] uppercase text-[#a855f7] tracking-[0.05em] mb-4 font-normal flex items-center gap-2">
                  <IconTarget className="w-4 h-4" /> Daily Focus
                </h2>
                <input 
                  type="text" 
                  value={focus}
                  onChange={handleFocusChange}
                  placeholder="What is your main goal today?"
                  spellCheck="false"
                  className="bg-transparent border-0 border-b-2 border-white/10 text-white text-[32px] font-medium py-2 w-full outline-none transition-colors duration-300 focus:border-[#a855f7] placeholder:text-white/20"
                />
              </div>

              <div className="flex-1 flex flex-col justify-end">
                <h3 className="text-[12px] uppercase text-[#a855f7] tracking-[0.05em] mb-4 font-normal flex items-center gap-2">
                  <IconCheckCircle className="w-4 h-4" /> Top 3 Tasks
                </h3>
                <div className="flex flex-col gap-4">
                  {tasks.map(task => (
                    <div key={task.id} className="flex items-center gap-4 group">
                      <button 
                        onClick={() => toggleTask(task.id)}
                        className={`w-6 h-6 rounded-md border flex items-center justify-center transition-all duration-300 flex-shrink-0 cursor-pointer \${task.completed ? 'bg-[#a855f7] border-[#a855f7]' : 'bg-white/5 border-white/20 group-hover:border-[#a855f7]/50'}`}
                      >
                        {task.completed && <IconCheck className="w-4 h-4 text-white" />}
                      </button>
                      <input
                        type="text"
                        value={task.text}
                        onChange={(e) => handleTaskTextChange(task.id, e.target.value)}
                        placeholder={`Task \${task.id}...`}
                        spellCheck="false"
                        className={`bg-transparent border-0 text-white text-[16px] w-full outline-none transition-all duration-300 placeholder:text-white/20 \${task.completed ? 'opacity-30 line-through' : 'opacity-90 focus:opacity-100'}`}
                      />
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="bg-white/[0.03] backdrop-blur-[20px] border border-white/10 rounded-[24px] p-8 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] text-center flex flex-col justify-center relative overflow-hidden group">
              <div className="w-full flex justify-between items-center mb-2 px-2">
                <div className="text-[12px] uppercase text-[#94a3b8] tracking-[0.05em] text-center w-full relative">
                  <span className="flex items-center justify-center gap-2">
                    <IconTrendingUp className="w-4 h-4 text-purple-400" /> Total Earned
                  </span>
                  <button 
                    onClick={clearRevenue} 
                    className="absolute right-0 top-0 text-[10px] text-slate-500 hover:text-purple-400 transition-colors"
                    title="Reset Revenue"
                  >
                    Reset
                  </button>
                </div>
              </div>
              
              <div className={`text-[48px] font-[800] tabular-nums my-4 flex items-center justify-center gap-1 transition-all duration-300 ease-out origin-center \${isPulsating ? 'scale-110 drop-shadow-[0_0_25px_rgba(168,85,247,0.8)]' : ''}`}>
                <span className={`text-2xl font-medium mr-1 transition-colors duration-300 \${isPulsating ? 'text-white' : 'text-[#a855f7]'}`}>$</span>
                <span className={isPulsating ? 'text-white' : ''}>{revenue.toLocaleString()}</span>
              </div>

              <div className="w-full mt-4 flex flex-col gap-3">
                <div className="relative">
                  <IconDollar className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#94a3b8]" />
                  <input 
                    type="number" 
                    value={revenueInput}
                    onChange={(e) => setRevenueInput(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleAddRevenue()}
                    placeholder="Add revenue..."
                    className="w-full bg-transparent border-b-2 border-white/10 rounded-none pl-9 pr-4 py-2 outline-none focus:border-[#a855f7] transition-colors placeholder:text-white/20 text-sm focus:outline-none"
                  />
                </div>
                <button 
                  onClick={handleAddRevenue}
                  disabled={!revenueInput || Number(revenueInput) <= 0}
                  className="w-full bg-[#a855f7] text-white border-0 py-[14px] px-[28px] rounded-[12px] font-[600] cursor-pointer shadow-[0_4px_15px_rgba(168,85,247,0.4)] hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2"
                >
                  <IconSparkles className="w-4 h-4" /> Celebrate
                </button>
              </div>
            </section>

            <section className="col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-6">
              {tools.map((tool) => (
                <a 
                  key={tool.name}
                  href={tool.url}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="flex items-center gap-4 p-6 bg-white/[0.03] border border-white/10 rounded-[18px] no-underline text-white transition-colors duration-200 hover:bg-white/[0.08] hover:border-[#a855f7] group"
                >
                  <div className="w-[40px] h-[40px] rounded-[10px] bg-[rgba(168,85,247,0.1)] flex items-center justify-center text-[#a855f7] flex-shrink-0 group-hover:scale-110 transition-transform">
                    <tool.icon className="w-[20px] h-[20px]" />
                  </div>
                  <div className="flex flex-col">
                    <h3 className="text-[16px] font-[500] mb-[2px]">{tool.name}</h3>
                    <p className="text-[12px] text-[#94a3b8] m-0 leading-tight">{tool.desc}</p>
                  </div>
                </a>
              ))}
            </section>

          </main>

          <div className="w-full max-w-[1024px] mt-6 z-10 text-center pb-4">
            <p className="inline-block text-[12px] text-[#94a3b8]/80 italic tracking-wide bg-white/[0.02] border border-white/5 py-2 px-6 rounded-full">
              "{quote}"
            </p>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
